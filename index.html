<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="imgs/logo ponto.png" type="image/x-icon" sizes="64x64">
  <title>PontoCheck - Marcação de Ponto</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="main-container">
    <header class="header">
        <div class="logo-container">
          <img src="imgs/logo ponto.png" alt="Logo PontoCheck" class="logo">
          <h1>PontoCheck</h1>
        </div>
        <div class="user-actions">
          <span class="greeting">Bem-vindo, Carlos!</span>
          <i class="fas fa-user-circle"></i>
          <i class="fas fa-cog"></i>
          <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        </div>
      </header>      

    <section class="dashboard">
      <!-- Cartão do Horário Atual -->
      <div class="card time-display-card">
        <div id="timeDisplay">00:00:00</div>
        <p>Horário Atual</p>
      </div>

      <!-- Botão de Marcação de Ponto -->
      <div class="card action-card">
        <button class="checkin-btn" onclick="marcarPonto()">Marcar Ponto</button>
        <p id="statusMsg">Clique para registrar seu ponto.</p>
      </div>

      <!-- Histórico de Pontos -->
      <div class="card history-card">
        <h2>Histórico de Pontos</h2>
        <ul id="historyList"></ul>
      </div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
